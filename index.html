<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý File Công Việc - C++ Project Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="icon">📁</span>
                    Quản Lý File Công Việc
                </h1>
                <p class="subtitle">Hệ thống quản lý và hiển thị các file công việc C++</p>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Tổng số files:</span>
                <span class="stat-value" id="totalFiles">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ngôn ngữ:</span>
                <span class="stat-value">C++ | HTML | CSS</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm công việc...">
            </div>
        </div>

        <div class="content-wrapper">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>📂 Danh Mục</h3>
                </div>
                <ul class="category-list">
                    <li class="category-item active" data-category="all">
                        <span>Tất cả công việc</span>
                        <span class="count" id="allCount">0</span>
                    </li>
                    <li class="category-item" data-category="algorithm">
                        <span>🔬 Thuật toán</span>
                        <span class="count" id="algorithmCount">0</span>
                    </li>
                    <li class="category-item" data-category="data-structure">
                        <span>📊 Cấu trúc dữ liệu</span>
                        <span class="count" id="dataStructureCount">0</span>
                    </li>
                    <li class="category-item" data-category="project">
                        <span>🚀 Dự án</span>
                        <span class="count" id="projectCount">0</span>
                    </li>
                    <li class="category-item" data-category="utility">
                        <span>🛠️ Tiện ích</span>
                        <span class="count" id="utilityCount">0</span>
                    </li>
                </ul>
            </aside>

            <main class="main-content">
                <div class="files-grid" id="filesGrid">
                    <!-- Files will be dynamically loaded here -->
                </div>
            </main>
        </div>

        <div class="modal" id="fileModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle"></h2>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="file-info">
                        <p><strong>📄 Tên file:</strong> <span id="fileName"></span></p>
                        <p><strong>📁 Danh mục:</strong> <span id="fileCategory"></span></p>
                        <p><strong>💾 Kích thước:</strong> <span id="fileSize"></span></p>
                    </div>
                    <div class="code-container">
                        <pre><code id="fileContent" class="language-cpp"></code></pre>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
                    <button class="btn btn-primary" id="downloadBtn">Tải xuống</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
